<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Last Peg — Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #6B0A3B;
      --dark:   #47071F;
      --darker: #310514;
      --pink:   #F03C97;
      --yellow: #D4F20A;
      --white:  #FFFFFF;
    }

    html, body { height: 100%; overflow-x: hidden; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--pink);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px 60px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ─────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .title {
      font-family: 'Barlow', system-ui, sans-serif;
      font-weight: 900;
      font-size: min(13.5vw, 3.4rem);
      text-transform: uppercase;
      letter-spacing: -0.01em;
      color: var(--pink);
      line-height: 0.92;
      text-align: center;
      white-space: nowrap;
    }
    .subtitle {
      font-family: 'Barlow', system-ui, sans-serif; font-weight: 900;
      font-size: 1rem;
      color: var(--yellow);
      margin-top: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* ── WRAP ───────────────────────────────────── */
    .page-wrap {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── BACK BTN ───────────────────────────────── */
    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 2px solid rgba(240,60,151,0.35);
      border-radius: 50px;
      padding: 10px 20px;
      font-family: 'Barlow', sans-serif; font-weight: 900;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--pink);
      cursor: pointer;
      text-decoration: none;
      align-self: flex-start;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:hover { opacity: 0.7; }

    /* ── SECTION LABEL ──────────────────────────── */
    .section-label {
      font-family: 'Barlow', sans-serif; font-weight: 900;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .refresh-btn {
      background: transparent;
      border: none;
      color: rgba(212,242,10,0.5);
      font-size: 1rem;
      cursor: pointer;
      padding: 4px;
      transition: opacity 0.15s, transform 0.3s;
      -webkit-tap-highlight-color: transparent;
    }
    .refresh-btn:hover  { opacity: 0.8; }
    .refresh-btn.spinning { animation: spin 0.7s linear; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* ── LEADERBOARD PANEL ──────────────────────── */
    .lb-panel {
      background: var(--dark);
      border: 2px solid rgba(240,60,151,0.2);
      border-radius: 20px;
      overflow: hidden;
    }

    /* ── ROWS ───────────────────────────────────── */
    .lb-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(240,60,151,0.1);
      transition: background 0.1s;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row.top1 { background: rgba(212,242,10,0.06); }
    .lb-row.top2 { background: rgba(240,60,151,0.04); }
    .lb-row.top3 { background: rgba(240,60,151,0.02); }

    .lb-rank {
      font-family: 'Barlow', sans-serif; font-weight: 900;
      font-size: 1.1rem;
      min-width: 28px;
      text-align: center;
      line-height: 1;
    }
    .lb-row.top1 .lb-rank { color: var(--yellow); font-size: 1.3rem; }
    .lb-row.top2 .lb-rank { color: rgba(240,60,151,0.9); }
    .lb-row.top3 .lb-rank { color: rgba(240,60,151,0.7); }
    .lb-row:not(.top1):not(.top2):not(.top3) .lb-rank { color: rgba(240,60,151,0.4); }

    .lb-info {
      flex: 1;
      min-width: 0;
    }
    .lb-name {
      font-family: 'Barlow', sans-serif; font-weight: 900;
      font-size: 1rem;
      color: var(--white);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lb-date {
      font-size: 0.7rem;
      color: rgba(240,60,151,0.4);
      margin-top: 1px;
    }
    .lb-score {
      font-family: 'Barlow', sans-serif; font-weight: 900;
      font-size: 1.15rem;
      color: var(--yellow);
      letter-spacing: -0.02em;
      white-space: nowrap;
    }
    .lb-row:not(.top1) .lb-score { color: var(--pink); font-size: 1rem; }

    /* ── CONE STRIP (top 1) ─────────────────────── */
    .lb-row.top1 .lb-score::after {
      content: ' ★';
      font-size: 0.8em;
      opacity: 0.6;
    }

    /* ── EMPTY / ERROR STATE ────────────────────── */
    .lb-empty {
      padding: 40px 20px;
      text-align: center;
      color: rgba(240,60,151,0.4);
      font-size: 0.85rem;
      line-height: 1.6;
    }
    .lb-empty-icon { font-size: 2rem; margin-bottom: 10px; }

    /* ── LOADING ────────────────────────────────── */
    .lb-loading {
      padding: 40px 20px;
      text-align: center;
    }
    .lb-loading-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    .lb-loading-dots span {
      width: 8px; height: 8px;
      background: var(--pink);
      border-radius: 50%;
      animation: dot-bounce 1s infinite ease-in-out;
      opacity: 0.5;
    }
    .lb-loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .lb-loading-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes dot-bounce {
      0%,80%,100% { transform: translateY(0); opacity: 0.5; }
      40%          { transform: translateY(-8px); opacity: 1; }
    }

    /* ── PLAY BTN ───────────────────────────────── */
    .play-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: var(--yellow);
      color: var(--bg);
      border: none;
      border-radius: 14px;
      font-family: 'Barlow', sans-serif; font-weight: 900;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .play-btn:active { opacity: 0.75; transform: scale(0.97); }
  </style>
</head>
<body>

  <div class="header">
    <div class="title">The Last Peg</div>
    <div class="subtitle">Leaderboard</div>
  </div>

  <div class="page-wrap">

    <a class="back-btn" href="index.html">← Back to game</a>

    <div class="section-label">
      Top 25
      <button class="refresh-btn" id="refresh-btn" title="Refresh">↻</button>
    </div>

    <div class="lb-panel" id="lb-panel">
      <div class="lb-loading">
        <div class="lb-loading-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <a class="play-btn" href="index.html">↺ Play Again</a>

  </div>

<script>
// ── CONFIG — paste your Apps Script Web App URL here ──
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyO0sccMsabS4D0ksDBT_GiCi7fPMC8Lb5N_6pPf9zyA5y5bNe-pxkRhoNU4USAQjJW/exec';

// ── MEDAL LABELS ────────────────────────────────────────
const MEDALS = ['🥇', '🥈', '🥉'];

function rankClass(i) {
  if (i === 0) return 'top1';
  if (i === 1) return 'top2';
  if (i === 2) return 'top3';
  return '';
}

function rankLabel(i) {
  return MEDALS[i] || `#${i + 1}`;
}

// ── RENDER ──────────────────────────────────────────────
function renderScores(scores) {
  const panel = document.getElementById('lb-panel');
  if (!scores || scores.length === 0) {
    panel.innerHTML = `
      <div class="lb-empty">
        <div class="lb-empty-icon">🎯</div>
        No scores yet.<br>Be the first to submit one!
      </div>`;
    return;
  }

  panel.innerHTML = scores.map((s, i) => `
    <div class="lb-row ${rankClass(i)}">
      <div class="lb-rank">${rankLabel(i)}</div>
      <div class="lb-info">
        <div class="lb-name">${escHtml(s.name)}</div>
        <div class="lb-date">${escHtml(String(s.date || ''))}</div>
      </div>
      <div class="lb-score">${Number(s.score).toLocaleString()}</div>
    </div>
  `).join('');
}

function renderError() {
  document.getElementById('lb-panel').innerHTML = `
    <div class="lb-empty">
      <div class="lb-empty-icon">⚠️</div>
      Couldn't load scores.<br>Check your connection and try again.
    </div>`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── FETCH ───────────────────────────────────────────────
async function loadScores() {
  document.getElementById('lb-panel').innerHTML = `
    <div class="lb-loading">
      <div class="lb-loading-dots"><span></span><span></span><span></span></div>
    </div>`;
  try {
    const res  = await fetch(SCRIPT_URL, { redirect: 'follow' });
    const data = await res.json();
    renderScores(data.scores || []);
  } catch (err) {
    renderError();
  }
}

// ── REFRESH BUTTON ──────────────────────────────────────
document.getElementById('refresh-btn').addEventListener('click', () => {
  const btn = document.getElementById('refresh-btn');
  btn.classList.remove('spinning');
  void btn.offsetWidth;
  btn.classList.add('spinning');
  loadScores();
  btn.addEventListener('animationend', () => btn.classList.remove('spinning'), { once: true });
});

// ── INIT ────────────────────────────────────────────────
loadScores();
</script>
</body>
</html>
